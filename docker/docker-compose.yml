name: anythingllm

networks:
  anything-llm:
    driver: bridge

services:
  # ── Local LLM runtime (Ollama) ──
  ollama:
    container_name: anythingllm-ollama
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - anything-llm
    restart: unless-stopped
    # Pull the model at startup (change OLLAMA_MODEL in .env to swap)
    command: >
      sh -c "ollama serve &
             sleep 3 &&
             ollama pull ${OLLAMA_MODEL:-gemma4:latest} &&
             ollama pull ${EMBEDDING_MODEL_PREF:-nomic-embed-text:latest} &&
             wait"

  # ── AnythingLLM ──
  anything-llm:
    container_name: anythingllm
    build:
      context: ../.
      dockerfile: ./docker/Dockerfile
      args:
        ARG_UID: ${UID:-1000}
        ARG_GID: ${GID:-1000}
    cap_add:
      - SYS_ADMIN
    depends_on:
      - ollama
    volumes:
      - "./.env:/app/server/.env"
      - "../server/storage:/app/server/storage"
      - "../collector/hotdir/:/app/collector/hotdir"
      - "../collector/outputs/:/app/collector/outputs"
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - anything-llm
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ollama_data:
